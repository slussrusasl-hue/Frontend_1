<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <style>
        .bat{
            margin-top: 15px;
            margin-left: 20px;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            font-size: 2em;
            font-weight: 900;
        }
        #mysubmit{
            border-radius: 10px;
        }
    </style>
</head>
<body>
       <div class="bat">
             <input type="checkbox" id="mycheckbox">
        <label for="mycheckbox"> Select</label> <br>

        <input type="radio" id="visa" name="card">
        <label for="visa">Visa</label> <br>
        <input type="radio" id="mastercard" name="card">
        <label for="mastercard">Master Card</label> <br>
        <input type="radio" id="paypal" name="card">
        <label for="paypal">PayPal</label> <br><br>

        <button type="submit" id="mysubmit">submit</button>
        <br><br>

        <div id="result"></div>
        <div id="paytype"></div>
       </div>

       <label for="age">Enter Age</label>
       <input type="number" id="age">
       <input type="submit" value="submit" id="onsubmit">

       <div id="myage"></div>

       <div class="container mt-4">
            <div class="row">
                <div class="col-md-6">
                     <label for="" class="form-label">Select Month</label>
                     <select  id="month" class="form-select">
                        <option selected>Select</option>
                        <option value="1">March, April, May</option>
                        <option value="2">June, July, August</option>
                        <option value="3">September, October, November</option>
                        <option value="4">December, January, February</option>
                    </select>
                    <div class="mt-4">
                        <input type="submit" value="sened" id="getSeason">
                    </div>
                    <div class="alert alert-success mt-4" id="season">

                    </div>
                </div>
            </div>
       </div>

        <script>
            document.getElementById("getSeason").onclick = function() {

                let int =   parseInt(document.getElementById("month").value);

                switch (int){

                    case 1:
                        season.textContent = "Season is Spring!";
                        break;
                    
                    case 2:
                        season.textContent = "Season is Summer";
                        break;
                    case 3:
                        season.textContent = "Season is Autumn (Fall)";
                        break;
                    case 4:
                        season.textContent = "Season is Winter";
                        break;

                    default:
                        season.textContent = "It's Not valid month";
                        break;
                }
            }
        </script>
       
       <script>
                document.getElementById("onsubmit").onclick = function() {

                    let age  = document.getElementById("age").value;

                    let message = age>18 ? "You are Adult": "You are Children";

                    myage.textContent = message;
                }

       </script>
       
       <script>
            document.getElementById("mysubmit").onclick = function(){

                    if(mycheckbox.checked){
                        result.textContent = "You are selected";
                    }
                    else{
                        result.textContent = "You are not selected";
                    }

                    if(visa.checked){
                        paytype.textContent = "You selected Visa";
                    }
                    else if(mastercard.checked){
                        paytype.textContent = "You selected Master Card";
                    }
                    else if(paypal.checked){
                        paytype.textContent = "You selected Pay Pal";
                    }
                    else{
                        paytype.textContent = "Plase select payment method!";
                    }
            }
       </script>

</body>
</html>
