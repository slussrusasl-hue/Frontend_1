<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-md-6 ms-3 mt-2">

            <h1>Select Payment Method</h1>

            <div class="form-check">
                <input type="radio" name="payment" value="Visa" class="form-check-input">
                <label class="form-check-label">Visa</label>
            </div>

            <div class="form-check">
                <input type="radio" name="payment" value="Master Card" class="form-check-input">
                <label class="form-check-label">Master Card</label>
            </div>

            <div class="form-check">
                <input type="radio" name="payment" value="PayPal" class="form-check-input">
                <label class="form-check-label">PayPal</label>
            </div>

            <input type="button" 
                   class="btn btn-primary mt-4" 
                   value="Submit" 
                   id="send">

            <div class="alert alert-success mt-2" id="message"></div>
            <div class="alert alert-warning mt-2" id="nore">Notification</div>

        </div>
    </div>
</div>

<script>

    document.getElementById("send").onclick = function () {

        let payment = document.getElementsByName("payment");
        let payment_method = "";

        for(let i = 0; i< payment.length; i++){
           if(payment[i].checked){
                payment_method = payment[i].value;
           }
        }
           message.textContent = "You selected "+ payment_method;
    }

</script>


</body>
</html>
