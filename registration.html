<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6 mt-2 mx-auto text-center">
                <h1>Registration form</h1>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-md-6 mt-2 mx-auto">
                <form action="#">
                    <div>
                        <label for="name" class="form-label">Name</label>
                        <input type="text" class="form-control" id="name">
                    </div>
                    <div class="mt-2">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email">
                    </div>
                    <div class="mt-2">
                        <label for="pass1" class="form-label">Enter Password</label>
                        <input type="password" class="form-control" id="pass1">
                    </div>
                    <div class="mt-2">
                        <label for="pass2" class="form-label">Re enter Password</label>
                        <input type="password" class="form-control" id="pass2">
                    </div>
                    <div class="mt-2">
                        <label for="" class="form-label">Gender</label>
                        <input type="radio" id="gender" value="male" class="form-check-input ms-3">Male
                        <input type="radio" id="gender" value="female" class="form-check-input">Female
                    </div>
                    <div class="mt-2">
                        <label for="" class="form-label">Education</label>
                        <select name="edu" id="" class="form-select">
                            <option value="dit">DIT</option>
                            <option value="hdit">HDIT</option>
                            <option value="degree">Degree</option>
                        </select>
                    </div>
                    <input type="submit" class="btn btn-primary mt-2" value="submit" id="sub">
                </form>
            </div>
        </div>
    </div>
    <script>
        document.getElementById("sub").onclick = function(){

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let pass1 = document.getElementById("pass1").value;
            let pass2 = document.getElementById("pass2").value;
            let gender = document.getElementById("gender").value;

            if(name ==""){
                alert('Please fill the Name field');
            }
            if(email ==""){
                alert('Please fill the Email field');
            }
            if(pass1 !=pass2){
                alert('Password is mismatch')
            }
            if(gender==""){
                alert('Please Enter Gender!');
            }
        }
    </script>
</body>
</html>
